<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>展覽現場資料蒐集與採購媒合平台 | Expo Data & Sourcing Platform</title>
<style>
  :root{
    --cherry:#990011; --navy:#2f3c7e; --gold:#caa54a;
    --ink:#222; --mute:#777; --line:#e6e0de; --bg:#faf6f5; --card:#fff;
    --ok:#1f8a4c; --no:#b03030; --cond:#b8860b;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,"PingFang TC","Microsoft JhengHei","Hiragino Sans",sans-serif;
    color:var(--ink);background:var(--bg);line-height:1.6}
  .wrap{max-width:1080px;margin:0 auto;padding:0 20px}
  header{background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:50}
  .bar{display:flex;align-items:center;justify-content:space-between;gap:12px;min-height:60px;flex-wrap:wrap;padding:8px 0}
  .logo{font-weight:800;font-size:16px;color:var(--cherry)}
  .logo small{display:block;font-size:11px;color:var(--mute);font-weight:400}
  .right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .langsw{display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .langsw button{border:none;background:#fff;padding:6px 11px;font-size:12.5px;cursor:pointer;color:var(--mute);border-right:1px solid var(--line)}
  .langsw button:last-child{border-right:none}
  .langsw button.on{background:var(--cherry);color:#fff;font-weight:700}
  .rolepill{font-size:12px;padding:5px 12px;border-radius:20px;background:#f2dede;color:var(--cherry);font-weight:700}
  .backbtn{font-size:13px;color:var(--mute);cursor:pointer;border:1px solid var(--line);padding:6px 12px;border-radius:8px;background:#fff}
  .hero{padding:42px 0 22px;text-align:center}
  .hero h1{font-size:27px;color:var(--cherry);margin-bottom:6px}
  .hero .sub{color:var(--mute);font-size:14px}
  .exh{display:inline-block;margin:14px auto 0;background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 20px;font-size:13px}
  .exh b{color:var(--navy)}
  .grid4{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;margin:28px 0 44px}
  .entry{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:24px;cursor:pointer;transition:.15s;border-top:5px solid var(--cherry)}
  .entry:hover{transform:translateY(-3px);box-shadow:0 10px 26px rgba(0,0,0,.10)}
  .entry .ic{font-size:32px;margin-bottom:8px}
  .entry h3{font-size:18px;margin-bottom:3px}
  .entry .ja{font-size:12.5px;color:var(--navy);margin-bottom:10px}
  .entry p{font-size:13px;color:var(--mute)}
  .entry.n1{border-top-color:#2f7ea0}.entry.n2{border-top-color:var(--cherry)}
  .entry.n3{border-top-color:#3a9d6a}.entry.n4{border-top-color:var(--navy)}
  .tag{display:inline-block;font-size:11px;padding:2px 9px;border-radius:10px;background:#f2eae8;color:var(--mute);margin-top:12px}
  .view{display:none}.view.active{display:block;animation:fade .25s}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .portalhead{padding:24px 0 8px}.portalhead h2{font-size:22px}
  .portalhead .desc{font-size:13.5px;color:var(--mute);margin-top:8px;max-width:780px}
  .langnote{font-size:12px;color:var(--gold);font-weight:700;margin-top:6px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px;margin:16px 0}
  .card h4{font-size:16px;color:var(--cherry);margin-bottom:12px;border-bottom:2px solid #f2dede;padding-bottom:7px}
  .navy h4{color:var(--navy);border-bottom-color:#dde0ef}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{border:1px solid var(--line);padding:8px 10px;text-align:left;vertical-align:top}
  th{background:#f6efee;font-weight:700}
  .yes{color:var(--ok);font-weight:700}.non{color:var(--no)}.cnd{color:var(--cond)}.na{color:var(--mute)}
  .plist{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
  .pcard{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#fff}
  .pcard .ph{height:92px;display:flex;align-items:center;justify-content:center;font-size:44px;background:#f7f1f0}
  .pcard .pb{padding:12px}
  .pcard h5{font-size:14px;margin-bottom:4px}
  .pcard .meta{font-size:12px;color:var(--mute)}
  .pcard .price{color:var(--cherry);font-weight:700;font-size:13px;margin-top:6px}
  .stars{color:var(--gold);font-size:13px}
  .pill{display:inline-block;font-size:11px;padding:2px 8px;border-radius:8px;margin:2px 3px 0 0}
  .pill.tw{background:#e2f0e6;color:#1f8a4c}.pill.cn{background:#fde8e8;color:#b03030}
  .pill.warn{background:#fff3d6;color:#b8860b}.pill.lv{background:#eef0fb;color:var(--navy)}
  .formrow{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px}
  .formrow label{flex:1 1 220px;font-size:13px}
  .formrow label span{display:block;color:var(--mute);font-size:12px;margin-bottom:3px}
  .formrow input,.formrow textarea{width:100%;padding:8px;border:1px solid var(--line);border-radius:8px;font-size:13px;font-family:inherit}
  .btn{display:inline-block;background:var(--cherry);color:#fff;border:none;padding:9px 18px;border-radius:9px;font-size:14px;cursor:pointer;font-weight:700}
  .btn.navy{background:var(--navy)}.btn.ghost{background:#fff;color:var(--cherry);border:1px solid var(--cherry)}
  .lvbar{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
  .lvtag{font-size:12px;padding:5px 12px;border-radius:9px;font-weight:700}
  .lv1{background:#e2f0e6;color:#1f8a4c}.lv2{background:#eef0fb;color:var(--navy)}
  .lv3{background:#f2dede;color:var(--cherry)}.lv4{background:#fff3d6;color:#b8860b}
  .crumbs{font-size:12px;color:var(--mute);margin:14px 0 4px}.crumbs span{color:var(--cherry)}
  .selrow{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:10px 0}
  .selrow select{padding:8px;border:1px solid var(--line);border-radius:8px;font-size:13px}
  .note{background:#fff7f7;border-left:3px solid var(--cherry);padding:8px 12px;font-size:12.5px;color:#7a5a5a;border-radius:0 8px 8px 0;margin-top:8px}
  .adminnote{background:#f4f2fb;border-left:3px solid var(--navy);color:#4a4a6a}
  .miniflow{font-size:13px;color:var(--mute);line-height:1.9}
  footer{text-align:center;color:var(--mute);font-size:12px;padding:28px 0 40px;border-top:1px solid var(--line);margin-top:28px}
  .lock{color:var(--mute);font-size:12px;font-style:italic}
  @media(max-width:680px){.grid4{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <div class="wrap bar">
    <div class="logo" id="logo"></div>
    <div class="right">
      <div class="langsw" id="langsw"></div>
      <div id="rolebox"></div>
    </div>
  </div>
</header>

<div class="wrap">
  <section id="v-home" class="view active"></section>
  <section id="v-exhibitor" class="view"></section>
  <section id="v-buyer" class="view"></section>
  <section id="v-consumer" class="view"></section>
  <section id="v-admin" class="view"></section>
  <section id="v-perm" class="view"></section>
</div>

<footer><div class="wrap">
  <span id="footLogoSub"></span><br>
  <span id="footPerm" style="cursor:pointer;color:var(--cherry)"></span>　|　<span id="footNote"></span>
</div></footer>

<script src="data.js"></script>
<script>
let LANG = localStorage.getItem('expoLang') || 'tc';
let VIEW = 'home';
const VIEWS=['home','exhibitor','buyer','consumer','admin','perm'];
let buyerId = DB.buyers[0].id;
const t = o => (o && o[LANG]!==undefined) ? o[LANG] : o;
const stars = n => '★'.repeat(n)+'☆'.repeat(5-n);
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function setLang(l){ LANG=l; localStorage.setItem('expoLang',l); renderAll(); }
function go(v){ VIEW=v; render(); location.hash=v; window.scrollTo(0,0); }

function renderLangSwitch(){
  document.getElementById('langsw').innerHTML = ['tc','sc','ja','en'].map(l=>
    `<button class="${l===LANG?'on':''}" onclick="setLang('${l}')">${I18N.langNames[l]}</button>`).join('');
}
function renderHeader(){
  document.getElementById('logo').innerHTML = `${t(I18N.logo)}<small>${I18N.logoSub}</small>`;
  const rb=document.getElementById('rolebox');
  const roleMap={exhibitor:I18N.entries[0].title,buyer:I18N.entries[1].title,consumer:I18N.entries[2].title,admin:I18N.entries[3].title};
  if(VIEW==='home'){rb.innerHTML='';}
  else if(roleMap[VIEW]){rb.innerHTML=`<span class="rolepill">${t(I18N.rolePrefix)}${t(roleMap[VIEW])}</span> <span class="backbtn" onclick="go('home')">${t(I18N.switchRole)}</span>`;}
  else {rb.innerHTML=`<span class="backbtn" onclick="go('home')">${t(I18N.backHome)}</span>`;}
  document.getElementById('footLogoSub').textContent=I18N.logoSub;
  document.getElementById('footPerm').textContent=t(I18N.viewPerm);
  document.getElementById('footPerm').onclick=()=>go('perm');
  document.getElementById('footNote').textContent=t(I18N.footer);
}
function exhLine(){const e=DB.exhibition;return `<b>${t(e.name)}</b><br>${e.date} ｜ ${t(e.venue)} ｜ ${e.organizer} ｜ ${t(e.scale)}`;}

function renderHome(){
  const H=I18N.home;
  let cards=I18N.entries.map(en=>`
    <div class="entry ${en.cls}" onclick="go('${en.id}')">
      <div class="ic">${en.ic}</div><h3>${t(en.title)}</h3>
      <div class="ja">${en.ja}</div><p>${t(en.desc)}</p>
      <span class="tag">${t(en.tag)}</span></div>`).join('');
  document.getElementById('v-home').innerHTML=`
    <div class="hero"><h1>${t(H.title)}</h1>
      <div class="sub">${t(H.sub1)}</div>
      <div class="exh">${exhLine()}</div></div>
    <div class="grid4">${cards}</div>
    <div class="card"><h4>${t(H.levelsTitle)}</h4>
      <div class="lvbar">
        <span class="lvtag lv1">${t(H.lv1)}</span><span class="lvtag lv2">${t(H.lv2)}</span>
        <span class="lvtag lv3">${t(H.lv3)}</span><span class="lvtag lv4">${t(H.lv4)}</span></div>
      <p style="font-size:13px;color:var(--mute)">${t(H.levelsDesc)}</p></div>`;
}

function field(lbl,ph){return `<label><span>${lbl}</span><input placeholder="${ph||''}"></label>`;}
function renderExhibitor(){
  const P=I18N.exhibitorPortal;
  document.getElementById('v-exhibitor').innerHTML=`
    <div class="crumbs"><span onclick="go('home')" style="cursor:pointer">●</span> / ${t(P.head)}</div>
    <div class="portalhead"><h2>🏭 ${t(P.head)}</h2>
      <div class="langnote">${t(P.langnote)}</div>
      <div class="desc">${t(P.desc)}</div></div>
    <div class="card navy"><h4>${t(P.sec1)}</h4>
      <div class="formrow">${field(t(P.f_company),'')}${field(t(P.f_booth),'E-12')}</div>
      <div class="formrow">${field(t(P.f_contact),'')}${field(t(P.f_category),'')}</div>
      <div class="formrow"><label><span>${t(P.f_profile)}</span><textarea rows="2"></textarea></label></div></div>
    <div class="card navy"><h4>${t(P.sec2)}</h4>
      <div class="formrow">${field(t(P.f_product),'')}${field(t(P.f_moq),'')}</div>
      <div class="formrow">${field(t(P.f_wholesale),'')}${field(t(P.f_sample),'')}</div>
      <div class="formrow">${field(t(P.f_export),'')}${field(t(P.f_oem),'')}</div>
      <div class="formrow"><label><span>📄 ${t(P.f_catalog)}</span><input type="file"></label><label><span>📄 ${t(P.f_pricelist)}</span><input type="file"></label></div>
      <div class="formrow"><label><span>🖼️ ${t(P.f_photo)}</span><input type="file" multiple></label><label><span>🎬 ${t(P.f_video)}</span><input type="file"></label></div>
      <button class="btn navy">${t(P.btn_submit)}</button>
      <button class="btn ghost" style="margin-left:8px">${t(P.btn_edit)}</button></div>
    <div class="card"><h4>🔒 ${t(P.lockTitle)}</h4><p class="lock">${t(P.lock)}</p></div>`;
}

function renderBuyer(){
  const P=I18N.buyerPortal;
  const opts=DB.buyers.map(b=>`<option value="${b.id}" ${b.id===buyerId?'selected':''}>${t(b.name)}</option>`).join('');
  const b=DB.buyers.find(x=>x.id===buyerId);
  let cards=b.grants.map(pid=>{
    const p=DB.products.find(x=>x.id===pid);if(!p)return'';
    const eo=DB.exhibitors.find(x=>x.id===p.exhibitorId);const c=p.consumer,d=p.b2b;
    return `<div class="pcard"><div class="ph">${c.image}</div><div class="pb">
      <h5>${t(p.name)}</h5><div class="meta">${t(eo.name)}｜${t(P.booth)} ${eo.booth}</div>
      <div class="stars">${stars(d.recommend)}</div>
      <div style="font-size:12px;margin-top:6px">
        <div>${t(P.moq)}:<b>${t(d.moq)}</b></div>
        <div>${t(P.wholesale)}:<b style="color:var(--cherry)">${t(d.wholesale)}</b></div>
        <div>${t(P.exportL)}:${t(d.exportT)}</div><div>${t(P.oem)}:${t(d.oem)}</div>
        <div>${t(P.sample)}:${t(d.sample)}</div></div>
      <div style="margin-top:6px">
        ${d.fit_tw?`<span class="pill tw">${t(P.fitTw)}</span>`:''}
        ${d.fit_cn?`<span class="pill cn">${t(P.fitCn)}</span>`:''}
        ${d.follow?`<span class="pill lv">${t(P.follow)}</span>`:''}</div>
      <div class="note">${t(P.adminNote)}${t(d.adminNote)}</div>
      <div style="margin-top:8px"><button class="btn" style="padding:5px 12px;font-size:12px">★ ${t(P.fav)}</button>
      <button class="btn ghost" style="padding:5px 12px;font-size:12px;margin-left:4px">${t(P.request)}</button></div>
      </div></div>`;
  }).join('');
  document.getElementById('v-buyer').innerHTML=`
    <div class="crumbs"><span onclick="go('home')" style="cursor:pointer">●</span> / ${t(P.head)}</div>
    <div class="portalhead"><h2>📋 ${t(P.head)}</h2>
      <div class="langnote">${t(P.langnote)}</div><div class="desc">${t(P.desc)}</div></div>
    <div class="selrow"><b>${t(P.myProject)}</b>
      <select onchange="buyerId=this.value;renderBuyer()">${opts}</select>
      <span style="font-size:12px;color:var(--mute)">${t(P.cat)}${t(b.focus)}｜${t(P.market)}${t(b.market)}</span></div>
    <div class="crumbs">${t(P.authorized)} (${b.grants.length})</div>
    <div class="plist">${cards}</div>
    <div class="card" style="margin-top:18px"><h4>🔒 ${t(P.lockTitle)}</h4><p class="lock">${t(P.lock)}</p></div>`;
}

function renderConsumer(){
  const P=I18N.consumerPortal;
  let cards=DB.products.map(p=>{const c=p.consumer;
    return `<div class="pcard"><div class="ph">${c.image}</div><div class="pb">
      <h5>${t(p.name)}</h5><div class="meta">${t(c.origin)}</div>
      <div style="font-size:12px;margin-top:6px">${t(c.story)}</div>
      <div style="font-size:12px;margin-top:4px;color:var(--mute)">${t(P.feature)}${t(c.feature)}</div>
      <div style="font-size:12px;margin-top:2px;color:var(--mute)">${t(P.usage)}${t(c.usage)}</div>
      <div class="price">${t(c.price)}</div>
      <div style="margin-top:8px"><button class="btn" style="padding:5px 12px;font-size:12px">🛒 ${t(c.buy)}</button>
      <button class="btn ghost" style="padding:5px 12px;font-size:12px;margin-left:4px">★ ${t(P.fav)}</button></div>
      </div></div>`;}).join('');
  document.getElementById('v-consumer').innerHTML=`
    <div class="crumbs"><span onclick="go('home')" style="cursor:pointer">●</span> / ${t(P.head)}</div>
    <div class="portalhead"><h2>🛍️ ${t(P.head)}</h2>
      <div class="langnote">${t(P.langnote)}</div><div class="desc">${t(P.desc)}</div></div>
    <div class="plist">${cards}</div>
    <div class="card" style="margin-top:18px"><h4>🔒 ${t(P.lockTitle)}</h4><p class="lock">${t(P.lock)}</p></div>`;
}

function renderAdmin(){
  const P=I18N.adminPortal,e=DB.exhibition;
  let exhRows=DB.exhibitors.map(x=>`<tr><td>${t(x.name)}</td><td>${x.booth}</td><td>${t(x.category)}</td>
    <td>${x.reviewed?`<span class="yes">${t(P.reviewed)}</span>`:`<span class="cnd">${t(P.pending)}</span>`}</td>
    <td><button class="btn ghost" style="padding:4px 10px;font-size:12px">${x.reviewed?t(P.view):t(P.doReview)}</button></td></tr>`).join('');
  let prodRows=DB.products.map(p=>{const d=p.b2b,a=p.admin;
    const gb=DB.buyers.filter(b=>b.grants.includes(p.id)).map(b=>b.id).join(', ');
    return `<tr><td>${t(p.name)}${d.unreviewed?` <span class="pill warn">${t(P.unreviewed)}</span>`:''}</td>
      <td class="stars">${stars(d.recommend)}</td>
      <td><span class="yes">${t(P.open)}</span></td>
      <td>${d.unreviewed?`<span class="non">${t(P.closed)}</span>`:`<span class="yes">${t(P.open)}</span>`}</td>
      <td><span class="pill lv">${gb||'—'}</span></td>
      <td style="font-size:12px"><div class="note adminnote">${t(P.verbal)}${t(a.verbal)}｜${t(P.attitude)}${t(a.attitude)}｜${t(P.risk)}${t(a.risk)}<br>${t(P.interested)}${a.interested.join(', ')}</div></td></tr>`;}).join('');
  document.getElementById('v-admin').innerHTML=`
    <div class="crumbs"><span onclick="go('home')" style="cursor:pointer">●</span> / ${t(P.head)}</div>
    <div class="portalhead"><h2>🛠️ ${t(P.head)}</h2>
      <div class="langnote">${t(P.langnote)}</div><div class="desc">${t(P.desc)}</div></div>
    <div class="card"><h4>${t(P.exhMgmt)}</h4>
      <table><thead><tr><th>${t(P.review).split('|')[0]}</th><th>${t(P.th_date)}</th><th>${t(P.th_venue)}</th><th>${t(P.th_status)}</th></tr></thead>
      <tbody><tr><td>${t(e.name)}</td><td>${e.date}</td><td>${t(e.venue)}</td><td><span class="yes">${t(e.status)}</span></td></tr></tbody></table>
      <div style="margin-top:10px"><button class="btn">${t(P.btnNewExpo)}</button>
        <button class="btn ghost" style="margin-left:6px">${t(P.btnQR)}</button>
        <button class="btn ghost" style="margin-left:6px">${t(P.btnExport)}</button></div></div>
    <div class="card"><h4>${t(P.review)}</h4>
      <table><thead><tr><th>${t(P.th_exh)}</th><th>${t(P.th_booth)}</th><th>${t(P.th_cat)}</th><th>${t(P.th_status)}</th><th>${t(P.th_op)}</th></tr></thead>
      <tbody>${exhRows}</tbody></table></div>
    <div class="card"><h4>${t(P.prodMgmt)}</h4>
      <p style="font-size:12.5px;color:var(--mute);margin-bottom:8px">${t(P.prodHint)}</p>
      <table><thead><tr><th>${t(P.th_prod)}</th><th>${t(P.th_rec)}</th><th>${t(P.th_l1)}</th><th>${t(P.th_l2)}</th><th>${t(P.th_l4)}</th><th>${t(P.th_l3)}</th></tr></thead>
      <tbody>${prodRows}</tbody></table></div>
    <div class="card"><h4>${t(P.supplement)}</h4><div class="miniflow">${t(P.supText)}</div></div>`;
}

function renderPerm(){
  const H=t(I18N.permHeaders);
  let head=H.map(h=>`<th>${h}</th>`).join('');
  let rows=I18N.permRows.map(r=>{
    let cells=r.v.map(code=>{
      const txt=t(I18N.permCode[code]);
      let cls='';
      if(code==='Y')cls='yes';else if(code==='N')cls='non';else if(code==='X')cls='na';else cls='cnd';
      return `<td class="${cls}">${txt}</td>`;
    }).join('');
    return `<tr><td><b>${t(r.f)}</b></td>${cells}</tr>`;
  }).join('');
  document.getElementById('v-perm').innerHTML=`
    <div class="crumbs"><span onclick="go('home')" style="cursor:pointer">●</span> / ${t(I18N.permTitle)}</div>
    <div class="portalhead"><h2>${t(I18N.permTitle)}</h2></div>
    <div class="card"><table><thead><tr>${head}</tr></thead><tbody>${rows}</tbody></table></div>`;
}

function render(){
  VIEWS.forEach(v=>document.getElementById('v-'+v).classList.toggle('active',v===VIEW));
  if(VIEW==='home')renderHome();
  else if(VIEW==='exhibitor')renderExhibitor();
  else if(VIEW==='buyer')renderBuyer();
  else if(VIEW==='consumer')renderConsumer();
  else if(VIEW==='admin')renderAdmin();
  else if(VIEW==='perm')renderPerm();
  renderHeader();
}
function renderAll(){ renderLangSwitch(); render(); }

window.addEventListener('load',()=>{
  const h=location.hash.replace('#','');
  if(VIEWS.includes(h))VIEW=h;
  renderAll();
});
</script>
